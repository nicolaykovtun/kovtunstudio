name: Deploy Astro to GitHub Pages

# Триггеры:
# 1. Push в main — основной деплой
# 2. Ручной запуск из вкладки Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

# Разрешения для GitHub Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой за раз, очередь не нужна
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build
        uses: withastro/action@v3
        with:
          node-version: 22
          package-manager: npm@latest

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
