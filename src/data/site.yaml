# Что делаю — три карточки
whatDo:
  title: "Три уровня оклейки&nbsp;—<br>под разные задачи"
  aside: >-
    Каждый уровень отвечает на свою задачу: обозначить бренд, привлечь
    внимание на дороге или выстроить сильный визуальный образ. Сложность
    графики и ручной проработки определяет цену.
  cards:
    - num: "01"
      title: Брендинг авто
      text: "Лаконичный макет: логотип, контакты, сайт, QR. Машина становится узнаваемой и работает на репутацию."
    - num: "02"
      title: Рекламная оклейка
      text: "Привлекает внимание на дороге: услуги, продукт, акценты, призыв к действию. Такая оклейка продаёт, пока машина стоит в пробке или на парковке."
      featured: true
    - num: "03"
      title: Имиджевая концепция
      text: "Иллюстрации, коллажи, фотоматериалы — когда нужно построить сильный визуальный образ бренда на кузове."

# Тарифы — секция (массив самих тарифов в tiers.yaml)
pricing:
  title: "Три пакета<br>Сразу видно, что входит"
