# Процесс — 4 шага
process:
  title: "От брифа<br>до файла в&nbsp;мастерскую<br>по&nbsp;производству"
  aside: >-
    Понятные этапы и сроки. Без бесконечных согласований и сюрпризов
    в финальной цене.
  steps:
    - num: "01"
      title: Бриф
      text: "Марка и модель, что должно быть на машине, фирменный стиль, пожелания. 10 минут в Telegram."
    - num: "02"
      title: Концепция
      text: "2–3 направления макета с разной подачей. Выбираем рабочее, дорабатываем."
    - num: "03"
      title: Доработки
      text: "Уточняем по обратной связи: цвета, акценты, размеры, компоновка. До результата."
    - num: "04"
      title: Под печать
      text: "Финальный макет в нужном разрешении и формате. Файл — сразу в мастерскую по производству."

