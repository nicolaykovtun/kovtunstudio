# Что делаю — три карточки
whatDo:
  title: "Три уровня оклейки —<br>под разные задачи"
  aside: >-
    Цена зависит не от размера машины, а от сложности задачи: чем больше
    рекламной нагрузки, графики и ручной проработки, тем выше стоимость.
  cards:
    - num: "01"
      title: Брендинг авто
      text: "Лаконичный макет: логотип, контакты, сайт, QR. Машина становится узнаваемой и работает на репутацию."
    - num: "02"
      title: Рекламная оклейка
      text: "Привлекает внимание на дороге: услуги, продукт, акценты, призыв к действию. Не реклама, а инструмент продаж."
      featured: true
    - num: "03"
      title: Имиджевая концепция
      text: "Иллюстрации, коллажи, фотоматериалы — когда нужно построить сильный визуальный образ бренда на кузове."

