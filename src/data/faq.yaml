# faq.yaml — вопросы и ответы.
# Один источник правды: и в <details> блоке на странице, и в JSON-LD FAQPage.

- q: Чем отличаются пакеты 10, 15 и 25 тысяч?
  a: 10 000 ₽ — простой и понятный брендинг&#58; логотип, контакты, фирменные цвета, аккуратная компоновка. 15 000 ₽ — больше информации, рекламные акценты, сложнее подача на кузове. 25 000 ₽ — полноценная рекламная концепция со сложной графикой и глубокой проработкой.

- q: Что нужно прислать для расчёта?
  a: Марку и модель автомобиля, логотип и фирменный стиль (если есть), что должно быть на машине — контакты, сайт, QR, список услуг, фото товара. И пожелания по стилю — референсы, цвета, настроение.

- q: Делаете только дизайн или ещё и поклейку?
  a: Только дизайн — макеты под плёнку. Передаю файл, который ваш подрядчик по оклейке печатает и клеит без доработок. По запросу могу подсказать проверенных мастеров во Владивостоке.

- q: Сколько занимает работа?
  a: Базовый макет — 3–5 дней, расширенный — 5–7 дней, имиджевая концепция — от 7 до 14 дней. Срок зависит от сложности и скорости обратной связи.

- q: Работаете с заказчиками из других городов?
  a: Да. Базируюсь во Владивостоке, но работаю по всей России. Весь процесс — онлайн&#58; Telegram, видеосвязь, файлы по почте. Локация не влияет на цену.

- q: Можно ли внести правки после готового макета?
  a: Правки внутри одобренной концепции — да, включены в стоимость. Если хочется развернуть макет в принципиально новую сторону, оцениваю отдельно.

- q: Что входит в «макет под печать»?
  a: Файлы в нужных форматах (AI / PDF / TIFF), цвет в CMYK, разрешение под плоттер, развёртка по сторонам авто, отбивки и припуски. Подрядчик берёт файл и сразу печатает.
