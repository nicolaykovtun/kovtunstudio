# faq.yaml — вопросы и ответы.
# Один источник правды: и в <details> блоке на странице, и в JSON-LD FAQPage.

- q: Чем отличаются пакеты 10, 15 и 25 тысяч?
  a: "10 000 ₽ — простой и понятный брендинг: логотип, контакты, фирменные цвета, аккуратная компоновка. 15 000 ₽ — больше информации, рекламные акценты, сложнее подача на кузове. 25 000 ₽ — полноценная рекламная концепция со сложной графикой и глубокой проработкой."

- q: Что нужно прислать для расчёта?
  a: Марку и модель автомобиля, логотип и фирменный стиль (если есть), что должно быть на машине — контакты, сайт, QR, список услуг, фото товара. И пожелания по стилю — референсы, цвета, настроение.

- q: Делаете только дизайн или ещё и поклейку?
  a: Только дизайн — макеты под плёнку. Передаю файл, который ваш подрядчик по оклейке печатает и клеит без доработок. По запросу могу подсказать проверенных мастеров во Владивостоке.

- q: Сколько занимает работа?
  a: Базовый макет — 3–5 дней, расширенный — 5–7 дней, имиджевая концепция — от 7 до 14 дней. Срок зависит от сложности и скорости обратной связи.

- q: Работаете с заказчиками из других городов?
  a: "Да. Базируюсь во Владивостоке, но работаю по всей России. Весь процесс — онлайн: Telegram, видеосвязь, файлы по почте. Локация не влияет на цену."

- q: Можно ли внести правки после готового макета?
  a: Правки внутри одобренной концепции — да, включены в стоимость. Если хочется развернуть макет в принципиально новую сторону, оцениваю отдельно.

- q: Что входит в «макет под печать»?
  a: Файлы в нужных форматах (AI / PDF / TIFF), цвет в CMYK, разрешение под плоттер, развёртка по сторонам авто, отбивки и припуски. Подрядчик берёт файл и сразу печатает.

- q: Какие файлы вы передаёте после завершения работы?
  a: "Передаю исходник и печатные файлы в форматах, которые нужны производству: обычно AI, PDF или TIFF. В макете учитываются цветовая модель CMYK, масштаб, припуски, стороны автомобиля и технические требования подрядчика по печати."

- q: Можно ли заказать дизайн сразу для нескольких машин?
  a: "Да, можно. Для автопарка сначала собираю общую визуальную систему: логика размещения логотипа, контактов, рекламных блоков и графики. После утверждения адаптирую макет под разные модели и кузова, чтобы машины выглядели одной линейкой."

- q: Работаете ли вы с рекламными агентствами и типографиями?
  a: Да. Могу подключаться как дизайнер на стороне агентства, подрядчика по печати или студии оклейки. В таком формате заранее согласуем технические требования, формат файлов, порядок правок и ответственного за финальную проверку перед печатью.

- q: Что делать, если у компании нет готового фирменного стиля?
  a: "Могу собрать аккуратную визуальную основу для оклейки из того, что уже есть: логотипа, цветов, контактов, фотографий продукта и примеров, которые нравятся. Если нужна полноценная айдентика до оклейки, разработку логотипа и стиля обсуждаем отдельным проектом."
